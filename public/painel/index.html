<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel OCR Interativo</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f9f9f9;
      color: #333;
    }
    main {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 2rem;
    }
    #upload-area {
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 2rem;
    }
    th, td {
      padding: 0.6rem;
      border: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #f0f0f0;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.4rem;
      box-sizing: border-box;
      word-break: break-word;
    }
    .btn {
      padding: 0.6rem 1.2rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #0056b3;
    }
    .ajustar { background-color: #fff4f4; }
    .ok { background-color: #f1fff1; }
    .toast {
      padding: 1rem;
      margin-top: 1.5rem;
      border-radius: 5px;
      display: none;
      font-weight: bold;
    }
    .toast.success { background-color: #d4edda; color: #155724; }
    .toast.error { background-color: #f8d7da; color: #721c24; }
    pre {
      background: #f3f3f3;
      padding: 1rem;
      margin-top: 2rem;
      overflow-x: auto;
      border-radius: 5px;
      font-size: 0.9rem;
    }
    #grafico {
      max-width: 100%;
      border: 1px solid #ccc;
      margin-top: 1rem;
      border-radius: 5px;
    }
    #metricas {
      margin: 1rem 0;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
<main>
  <h1>📊 Painel Interativo de Correção OCR</h1>

  <form id="form-ocr">
    <div id="upload-area">
      <input type="file" id="imagemInput" accept="image/*" required />
      <button type="submit" class="btn">📷 Enviar Imagem para OCR</button>
      <button type="button" class="btn" onclick="atualizarUltimoJson()">🔄 Atualizar JSON</button>
    </div>
  </form>

  <div id="metricas"></div>
  <img id="grafico" src="/grafico" alt="Gráfico de Aprendizado" />

  <table id="tabela">
    <thead>
      <tr>
        <th>#</th>
        <th>Produto</th>
        <th>Preço Original</th>
        <th>Preço Promocional</th>
        <th>Condição</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div style="margin-top: 2rem;">
    <button class="btn" onclick="enviarFeedback()">🚀 Enviar Feedback</button>
    <button class="btn" onclick="rodarAprendizado()">🤖 Rodar Aprendizado</button>
    <button class="btn" onclick="exportarJSON()">💾 Exportar JSON</button>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <pre id="saida"></pre>
</main>
<script>
  const tabela = document.querySelector("#tabela tbody");

  function mostrarToast(msg, tipo) {
    console.log(`[TOAST] ${tipo}:`, msg);
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = `toast ${tipo}`;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 4000);
  }

  function adicionarLinha(i, item) {
    console.log(`[DEBUG] Adicionando linha ${i + 1}`, item);
    const tr = document.createElement("tr");
    tr.className = item.status === "ajustar" ? "ajustar" : "ok";
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td><input type="text" value="${item.produto || ""}" /></td>
      <td><input type="text" value="${item.preco_original || ""}" /></td>
      <td><input type="text" value="${item.preco_promocional || ""}" /></td>
      <td><input type="text" value="${item.condicao || ""}" /></td>
      <td>
        <select onchange="atualizarStatus(this)">
          <option value="ok" ${item.status === "ok" ? "selected" : ""}>✔️ Correto</option>
          <option value="ajustar" ${item.status === "ajustar" ? "selected" : ""}>❌ Corrigir</option>
        </select>
      </td>`;
    tabela.appendChild(tr);
  }

  function atualizarStatus(select) {
    const linha = select.closest("tr");
    linha.className = select.value === "ajustar" ? "ajustar" : "ok";
  }

  function coletarLinhas() {
    const resultado = [];
    tabela.querySelectorAll("tr").forEach((linha) => {
      const inputs = linha.querySelectorAll("input");
      const status = linha.querySelector("select").value;
      resultado.push({
        produto: inputs[0].value,
        preco_original: inputs[1].value || null,
        preco_promocional: inputs[2].value,
        condicao: inputs[3].value || null,
        status: status
      });
    });
    console.log("[DEBUG] Linhas coletadas:", resultado);
    return resultado;
  }

  async function enviarFeedback() {
    const dados = coletarLinhas();
    try {
      const res = await fetch("/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
      });
      mostrarToast(res.ok ? "✅ Feedback enviado!" : "❌ Erro ao enviar feedback.", res.ok ? "success" : "error");
    } catch (err) {
      console.error("[ERRO] Envio de feedback:", err);
      mostrarToast("❌ Erro de rede ao enviar feedback.", "error");
    }
  }

  async function atualizarUltimoJson() {
    try {
      const res = await fetch("/atualizar-json", { method: "POST" });
      const data = await res.json();
      mostrarToast("📦 JSON atualizado: " + data.arquivo, "success");
      await carregarUltimoJSON();
    } catch (e) {
      console.error("[ERRO] Atualizar JSON:", e);
      mostrarToast("❌ Erro ao atualizar JSON: " + e.message, "error");
    }
  }

  async function rodarAprendizado() {
    try {
      const res = await fetch("/aprender", { method: "POST" });
      const json = await res.json();
      document.getElementById("saida").textContent = json.log;
      mostrarToast("🤖 Aprendizado executado!", "success");
      carregarMetricas();
    } catch (e) {
      console.error("[ERRO] Aprendizado:", e);
      mostrarToast("❌ Erro ao rodar aprendizado: " + e.message, "error");
    }
  }

  async function carregarUltimoJSON() {
    try {
      const res = await fetch("/ultimoreconhecimento.json");
      const json = await res.json();
      const dados = Array.isArray(json) ? json : json.resultado_final?.resultados_parser?.[0] || json.resultados_parser?.[0] || json.promocoes || [];

      if (!dados.length) return mostrarToast("⚠️ Nenhuma promoção encontrada.", "error");
      tabela.innerHTML = "";
      dados.forEach((item, i) => adicionarLinha(i, item));
      mostrarToast("✅ Painel carregado com sucesso!", "success");
    } catch (e) {
      console.error("[ERRO] Carregando JSON:", e);
      mostrarToast("❌ Erro ao carregar JSON: " + e.message, "error");
    }
  }

  async function carregarMetricas() {
    try {
      const res = await fetch("/metricas");
      const json = await res.json();
      document.getElementById("metricas").innerHTML = `🧠 Precisão atual: <strong>${json.precisao}%</strong> (${json.total_corretos} de ${json.total_feedbacks})`;
      document.getElementById("grafico").src = "/grafico?" + Date.now();
    } catch (e) {
      console.error("[ERRO] Carregar métricas:", e);
      mostrarToast("⚠️ Erro ao carregar métricas", "error");
    }
  }

  document.getElementById("form-ocr").addEventListener("submit", async (e) => {
    e.preventDefault();
    const input = document.getElementById("imagemInput");
    const file = input.files[0];
    if (!file) return mostrarToast("⚠️ Selecione uma imagem!", "error");

    const formData = new FormData();
    formData.append("file", file);
    const btn = e.submitter;
    btn.disabled = true;
    btn.textContent = "⏳ Processando...";

    try {
      const res = await fetch("/ocr", { method: "POST", body: formData });
      const json = await res.json();
      const dados = json.promocoes || [];
      tabela.innerHTML = "";
      dados.forEach((item, i) => adicionarLinha(i, item));
      mostrarToast("📄 OCR concluído!", "success");
    } catch (e) {
      console.error("[ERRO] OCR:", e);
      mostrarToast("❌ Erro ao processar imagem: " + e.message, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "📷 Enviar Imagem para OCR";
    }
  });

  carregarUltimoJSON();
  carregarMetricas();
</script>
</body>
</html>
