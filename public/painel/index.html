<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel OCR Interativo</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --accent: #1f6feb;
      --accent-dark: #1249a5;
      --ok: #e9f9ee;
      --warn: #fff1f0;
      --text: #243041;
      --muted: #5c6b80;
      --border: #d8e0ec;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 2rem;
      background: linear-gradient(180deg, #eef3fb 0%, #f9fbff 100%);
      color: var(--text);
    }
    main {
      max-width: 1120px;
      margin: auto;
      background: var(--panel);
      padding: 2rem;
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(28, 46, 78, 0.12);
    }
    h1 {
      margin-top: 0;
      text-align: center;
      color: #16324f;
      margin-bottom: 0.75rem;
    }
    p {
      text-align: center;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    #upload-area,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
    }
    th, td {
      padding: 0.75rem;
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f6f8fc;
    }
    input[type="text"],
    select {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      color: var(--text);
    }
    .btn {
      padding: 0.75rem 1.2rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
    .btn:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }
    tr.ajustar { background-color: var(--warn); }
    tr.ok { background-color: var(--ok); }
    .toast {
      padding: 1rem;
      margin-top: 1.5rem;
      border-radius: 12px;
      display: none;
      font-weight: 700;
    }
    .toast.success { background-color: #dff6e6; color: #14532d; }
    .toast.error { background-color: #fde2e2; color: #7f1d1d; }
    pre {
      background: #101828;
      color: #e2e8f0;
      padding: 1rem;
      margin-top: 1.5rem;
      overflow-x: auto;
      border-radius: 14px;
      font-size: 0.9rem;
      min-height: 52px;
    }
    #grafico {
      width: 100%;
      border: 1px solid var(--border);
      margin-top: 1rem;
      border-radius: 14px;
      background: white;
    }
    #metricas {
      margin: 1.25rem 0 0;
      font-weight: 700;
      color: var(--text);
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      background: #edf4ff;
      border: 1px solid #cfe0ff;
      color: #194077;
      font-weight: 600;
    }
  </style>
</head>
<body>
<main>
  <h1>Painel Interativo de Correção OCR</h1>
  <p>Revise o reconhecimento das promoções, corrija os campos necessários e alimente o aprendizado incremental.</p>

  <form id="form-ocr">
    <div id="upload-area">
      <input type="file" id="imagemInput" accept="image/*" required />
      <label for="execucoesInput">Execuções</label>
      <input type="number" id="execucoesInput" min="1" max="5" value="1" style="width: 90px;" />
      <button id="btn-ocr" type="submit" class="btn">Enviar imagem para OCR</button>
      <button type="button" class="btn" id="btn-atualizar-json">Atualizar JSON</button>
    </div>
  </form>

  <div class="meta">
    <div class="chip" id="provider-status">OCR: carregando...</div>
    <div class="chip" id="docs-status">Docs: carregando...</div>
  </div>

  <div id="metricas"></div>
  <img id="grafico" src="/grafico" alt="Gráfico de aprendizado" />

  <table id="tabela">
    <thead>
      <tr>
        <th>#</th>
        <th>Produto</th>
        <th>Preço Original</th>
        <th>Preço Promocional</th>
        <th>Condição</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="actions" style="margin-top: 2rem;">
    <button class="btn" type="button" id="btn-feedback">Enviar feedback</button>
    <button class="btn" type="button" id="btn-aprender">Rodar aprendizado</button>
    <button class="btn" type="button" id="btn-exportar">Exportar JSON</button>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <pre id="saida"></pre>
</main>
<script>
  const tabela = document.querySelector("#tabela tbody");
  const saida = document.getElementById("saida");
  const providerStatus = document.getElementById("provider-status");
  const docsStatus = document.getElementById("docs-status");

  function mostrarToast(msg, tipo) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = `toast ${tipo}`;
    toast.style.display = "block";
    window.setTimeout(() => {
      toast.style.display = "none";
    }, 4000);
  }

  function criarInput(valor) {
    const input = document.createElement("input");
    input.type = "text";
    input.value = valor || "";
    return input;
  }

  function adicionarLinha(indice, item) {
    const tr = document.createElement("tr");
    tr.className = item.status === "ajustar" ? "ajustar" : "ok";

    const tdIndice = document.createElement("td");
    tdIndice.textContent = String(indice + 1);

    const tdProduto = document.createElement("td");
    tdProduto.appendChild(criarInput(item.produto));

    const tdPrecoOriginal = document.createElement("td");
    tdPrecoOriginal.appendChild(criarInput(item.preco_original));

    const tdPrecoPromocional = document.createElement("td");
    tdPrecoPromocional.appendChild(criarInput(item.preco_promocional));

    const tdCondicao = document.createElement("td");
    tdCondicao.appendChild(criarInput(item.condicao));

    const tdStatus = document.createElement("td");
    const select = document.createElement("select");
    [{ value: "ok", label: "Correto" }, { value: "ajustar", label: "Corrigir" }].forEach((optionData) => {
      const option = document.createElement("option");
      option.value = optionData.value;
      option.textContent = optionData.label;
      option.selected = item.status === optionData.value;
      select.appendChild(option);
    });
    select.addEventListener("change", () => {
      tr.className = select.value === "ajustar" ? "ajustar" : "ok";
    });
    tdStatus.appendChild(select);

    tr.append(tdIndice, tdProduto, tdPrecoOriginal, tdPrecoPromocional, tdCondicao, tdStatus);
    tabela.appendChild(tr);
  }

  function coletarLinhas() {
    return Array.from(tabela.querySelectorAll("tr")).map((linha) => {
      const inputs = linha.querySelectorAll("input");
      const status = linha.querySelector("select").value;
      return {
        produto: inputs[0].value.trim(),
        preco_original: inputs[1].value.trim() || null,
        preco_promocional: inputs[2].value.trim(),
        condicao: inputs[3].value.trim() || null,
        status
      };
    });
  }

  async function lerResposta(res) {
    const contentType = res.headers.get("content-type") || "";
    if (contentType.includes("application/json")) {
      return res.json();
    }
    return { detail: await res.text() };
  }

  async function enviarFeedback() {
    const dados = coletarLinhas();
    try {
      const res = await fetch("/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
      });
      const body = await lerResposta(res);
      if (!res.ok) {
        throw new Error(body.detail || "Falha ao enviar feedback.");
      }
      mostrarToast("Feedback enviado com sucesso.", "success");
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  async function atualizarUltimoJson() {
    try {
      const res = await fetch("/atualizar-json", { method: "POST" });
      const body = await lerResposta(res);
      if (!res.ok) {
        throw new Error(body.detail || "Falha ao atualizar JSON.");
      }
      mostrarToast(`JSON atualizado: ${body.arquivo}`, "success");
      await carregarUltimoJSON();
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  async function rodarAprendizado() {
    try {
      const res = await fetch("/aprender", { method: "POST" });
      const body = await lerResposta(res);
      if (!res.ok) {
        throw new Error(body.detail || "Falha ao rodar aprendizado.");
      }
      saida.textContent = JSON.stringify(body.resumo, null, 2);
      mostrarToast("Aprendizado executado com sucesso.", "success");
      await carregarMetricas();
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  async function carregarUltimoJSON() {
    try {
      const res = await fetch("/ultimoreconhecimento.json");
      const body = await lerResposta(res);
      if (!res.ok) {
        throw new Error(body.detail || "Nenhum reconhecimento disponível.");
      }

      const dados = Array.isArray(body)
        ? body
        : body.resultado_final?.resultados_parser?.[0] || body.resultados_parser?.[0] || body.promocoes || [];

      tabela.innerHTML = "";
      if (!dados.length) {
        mostrarToast("Nenhuma promoção encontrada.", "error");
        return;
      }

      dados.forEach((item, indice) => adicionarLinha(indice, item));
      mostrarToast("Painel carregado com sucesso.", "success");
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  async function carregarMetricas() {
    try {
      const res = await fetch("/metricas");
      const body = await lerResposta(res);
      if (!res.ok) {
        throw new Error(body.detail || "Falha ao carregar métricas.");
      }
      document.getElementById("metricas").innerHTML =
        `Precisão atual: <strong>${body.precisao}%</strong> (${body.total_corretos} de ${body.total_feedbacks})`;
      document.getElementById("grafico").src = `/grafico?${Date.now()}`;
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  async function carregarStatusAplicacao() {
    try {
      const res = await fetch("/health");
      const body = await lerResposta(res);
      if (!res.ok) {
        throw new Error(body.detail || "Falha ao carregar status da aplicação.");
      }
      providerStatus.textContent = `OCR: ${body.ocr_provider}`;
      docsStatus.textContent = `Docs: ${body.docs_enabled ? "habilitadas" : "desabilitadas"}`;
    } catch (err) {
      providerStatus.textContent = "OCR: indisponível";
      docsStatus.textContent = "Docs: indisponíveis";
      mostrarToast(err.message, "error");
    }
  }

  function exportarJSON() {
    const dados = coletarLinhas();
    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "feedback-ocr.json";
    link.click();
    URL.revokeObjectURL(url);
  }

  document.getElementById("btn-feedback").addEventListener("click", enviarFeedback);
  document.getElementById("btn-aprender").addEventListener("click", rodarAprendizado);
  document.getElementById("btn-exportar").addEventListener("click", exportarJSON);
  document.getElementById("btn-atualizar-json").addEventListener("click", atualizarUltimoJson);

  document.getElementById("form-ocr").addEventListener("submit", async (event) => {
    event.preventDefault();
    const input = document.getElementById("imagemInput");
    const file = input.files[0];
    if (!file) {
      mostrarToast("Selecione uma imagem antes de enviar.", "error");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);
    const execucoes = Number(document.getElementById("execucoesInput").value || 1);
    const button = document.getElementById("btn-ocr");
    button.disabled = true;
    button.textContent = "Processando...";

    try {
      const res = await fetch(`/ocr?execucoes=${execucoes}`, { method: "POST", body: formData });
      const body = await lerResposta(res);
      if (!res.ok) {
        throw new Error(body.detail || "Falha no OCR.");
      }

      tabela.innerHTML = "";
      (body.promocoes || []).forEach((item, indice) => adicionarLinha(indice, item));
      providerStatus.textContent = `OCR: ${body.ocr_provider || "desconhecido"}`;
      mostrarToast("OCR concluído com sucesso.", "success");
      await carregarMetricas();
    } catch (err) {
      mostrarToast(err.message, "error");
    } finally {
      button.disabled = false;
      button.textContent = "Enviar imagem para OCR";
    }
  });

  carregarUltimoJSON();
  carregarMetricas();
  carregarStatusAplicacao();
</script>
</body>
</html>
